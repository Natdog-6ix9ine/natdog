name: Hexo Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # 监听 main 分支（文章分支）的推送

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出 config 分支（获取配置文件）
      - name: Checkout config branch
        uses: actions/checkout@v3
        with:
          ref: config

      # 2. 检出 main 分支的文章到 source/_posts
      - name: Checkout main branch articles
        uses: actions/checkout@v3
        with:
          ref: main
          path: source/_posts

      # 3. 清理 source/_posts 中的 .git 和 .obsidian
      - name: Clean up article directory
        run: |
          rm -rf source/_posts/.git
          rm -rf source/_posts/.obsidian
          rm -rf source/_posts/.github

      # 4. 为文章添加或补充 frontmatter
      - name: Add frontmatter to articles
        run: |
          find source/_posts -name "*.md" -type f | while read file; do
            # 提取文件名作为默认标题
            default_title=$(basename "$file" .md)
            # 提取相对路径
            rel_path=$(echo "$file" | sed 's|source/_posts/||')
            # 提取目录名作为分类
            dir_name=$(dirname "$rel_path")
            # 获取文件修改时间作为默认日期
            default_date=$(stat -c %y "$file" | cut -d' ' -f1)

            # 检查文件是否已有 frontmatter（以 --- 开头）
            if head -n 1 "$file" | grep -q "^---$"; then
              # 文件已有 frontmatter，检查并补充缺失字段
              has_title=$(grep -q "^title:" "$file" && echo "yes" || echo "no")
              has_date=$(grep -q "^date:" "$file" && echo "yes" || echo "no")

              if [ "$has_title" = "no" ] || [ "$has_date" = "no" ]; then
                # 读取 frontmatter 结束位置
                end_line=$(awk '/^---$/{if(NR>1){print NR; exit}}' "$file")

                # 创建临时文件
                temp_file="${file}.tmp"
                echo "---" > "$temp_file"

                # 添加缺失的 title
                if [ "$has_title" = "no" ]; then
                  echo "title: \"$default_title\"" >> "$temp_file"
                fi

                # 添加缺失的 date
                if [ "$has_date" = "no" ]; then
                  echo "date: $default_date" >> "$temp_file"
                fi

                # 复制原有的 frontmatter（跳过开头的 ---）
                sed -n '2,'"$((end_line-1))"'p' "$file" >> "$temp_file"

                echo "---" >> "$temp_file"

                # 复制正文部分
                tail -n +$((end_line+1)) "$file" >> "$temp_file"

                mv "$temp_file" "$file"
                echo "补充 frontmatter: $file (title=$has_title, date=$has_date)"
              fi
            else
              # 文件没有 frontmatter，创建完整的 frontmatter
              temp_file="${file}.tmp"
              echo "---" > "$temp_file"
              echo "title: \"$default_title\"" >> "$temp_file"
              echo "date: $default_date" >> "$temp_file"
              # 只有在子目录中的文章才添加分类
              if [ "$dir_name" != "." ]; then
                category=$(echo "$dir_name" | sed 's/^[0-9]*_//')
                echo "categories:" >> "$temp_file"
                echo "  - $category" >> "$temp_file"
              fi
              echo "---" >> "$temp_file"
              echo "" >> "$temp_file"
              cat "$file" >> "$temp_file"
              mv "$temp_file" "$file"
              echo "创建 frontmatter: $file"
            fi
          done

      # 5. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # 6. 安装依赖
      - name: Install Dependencies
        run: npm install

      # 7. 清理缓存
      - name: Clean Cache
        run: npx hexo clean

      # 8. 生成静态文件
      - name: Generate Static Files
        run: npx hexo generate

      # 9. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.GH_KEY }}
          publish_dir: ./public
          publish_branch: main
          external_repository: Natdog-6ix9ine/Natdog-6ix9ine.github.io
