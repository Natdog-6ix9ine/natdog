name: Hexo Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # 监听 main 分支（文章分支）的推送

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出 config 分支（获取配置文件）
      - name: Checkout config branch
        uses: actions/checkout@v3
        with:
          ref: config

      # 2. 检出 main 分支的文章到 source/_posts
      - name: Checkout main branch articles
        uses: actions/checkout@v3
        with:
          ref: main
          path: source/_posts

      # 3. 清理 source/_posts 中的 .git 和 .obsidian
      - name: Clean up article directory
        run: |
          rm -rf source/_posts/.git
          rm -rf source/_posts/.obsidian
          rm -rf source/_posts/.github

      # 4. 为文章添加 frontmatter
      - name: Add frontmatter to articles
        run: |
          find source/_posts -name "*.md" -type f | while read file; do
            # 检查文件是否已有 frontmatter（以 --- 开头）
            if ! head -n 1 "$file" | grep -q "^---$"; then
              # 提取文件名作为标题（去掉路径和扩展名）
              title=$(basename "$file" .md)
              # 提取相对路径
              rel_path=$(echo "$file" | sed 's|source/_posts/||')
              # 提取目录名作为分类
              dir_name=$(dirname "$rel_path")
              # 获取文件修改时间作为日期
              date=$(stat -c %y "$file" | cut -d' ' -f1)
              # 创建临时文件
              temp_file="${file}.tmp"
              # 写入 frontmatter
              echo "---" > "$temp_file"
              echo "title: \"$title\"" >> "$temp_file"
              echo "date: $date" >> "$temp_file"
              # 只有在子目录中的文章才添加分类
              if [ "$dir_name" != "." ]; then
                # 提取分类名（去掉数字前缀，如 "1_算子开发" -> "算子开发"）
                category=$(echo "$dir_name" | sed 's/^[0-9]*_//')
                echo "categories:" >> "$temp_file"
                echo "  - $category" >> "$temp_file"
              fi
              echo "---" >> "$temp_file"
              echo "" >> "$temp_file"
              # 追加原文件内容
              cat "$file" >> "$temp_file"
              # 替换原文件
              mv "$temp_file" "$file"
              echo "Added frontmatter to: $file (category: $category)"
            fi
          done

      # 5. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # 6. 安装依赖
      - name: Install Dependencies
        run: npm install

      # 7. 清理缓存
      - name: Clean Cache
        run: npx hexo clean

      # 8. 生成静态文件
      - name: Generate Static Files
        run: npx hexo generate

      # 9. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.GH_KEY }}
          publish_dir: ./public
          publish_branch: main
          external_repository: Natdog-6ix9ine/Natdog-6ix9ine.github.io
